<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saket Zepto - Live Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .category-scroll::-webkit-scrollbar { display: none; }
        .product-card { transition: transform 0.2s; border-radius: 15px; background: white; }
        .product-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <header class="bg-white p-4 shadow-md sticky top-0 z-50 text-center">
        <h1 class="text-2xl font-black text-purple-700 italic tracking-tighter">SAKET ZEPTO</h1>
        <div class="bg-yellow-100 inline-block px-4 py-1 rounded-full mt-2 border border-yellow-300">
            <span class="text-sm font-bold text-yellow-700 uppercase">🛒 My Cart: ₹<span id="cart-total">0</span></span>
        </div>
    </header>

    <main class="max-w-md mx-auto pb-28">
        <div class="p-4">
            <div class="bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 rounded-3xl p-6 text-white shadow-xl text-center">
                <h2 class="text-xl font-bold italic text-yellow-300">Saket's Super Store</h2>
                <p class="text-xs font-medium opacity-90 mt-1">Fresh Milk, Snacks & More in 10 Mins!</p>
            </div>
        </div>

        <div class="px-5 py-2">
            <h3 class="font-bold text-gray-800 mb-3 text-sm flex justify-between">
                <span>Shop by Category</span>
                <span class="text-purple-600">See All</span>
            </h3>
            <div class="flex gap-4 overflow-x-auto category-scroll pb-2">
                <div class="flex-shrink-0 text-center"><div class="bg-white shadow-sm p-4 rounded-2xl mb-1 text-2xl border border-gray-100">🥛</div><span class="text-[10px] font-bold">Dairy</span></div>
                <div class="flex-shrink-0 text-center"><div class="bg-white shadow-sm p-4 rounded-2xl mb-1 text-2xl border border-gray-100">🍜</div><span class="text-[10px] font-bold">Snacks</span></div>
                <div class="flex-shrink-0 text-center"><div class="bg-white shadow-sm p-4 rounded-2xl mb-1 text-2xl border border-gray-100">🥤</div><span class="text-[10px] font-bold">Drinks</span></div>
                <div class="flex-shrink-0 text-center"><div class="bg-white shadow-sm p-4 rounded-2xl mb-1 text-2xl border border-gray-100">🍎</div><span class="text-[10px] font-bold">Fruits</span></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 p-4" id="product-list">
            </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-200 z-50">
        <button onclick="sendOrder()" class="w-full max-w-md mx-auto bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-2xl shadow-2xl flex justify-between px-6 items-center transition-all">
            <div class="text-left">
                <span class="block text-[10px] uppercase opacity-80">Proceed to</span>
                <span class="text-lg">PLACE ORDER</span>
            </div>
            <div class="text-right">
                <span class="text-xl bg-green-900 px-3 py-1 rounded-xl">₹<span id="btn-total">0</span></span>
            </div>
        </button>
    </div>

    <script>
        // Updated with your GitHub image paths
        const products = [
            { id: 1, name: 'Amul Gold Milk', price: 33, weight: '500ml', img: './amul.jpg' },
            { id: 2, name: 'Maggi Masala', price: 14, weight: '70g', img: './maggi.jpg' },
            { id: 3, name: 'Coca Cola', price: 45, weight: '750ml', img: './coke.jpg' },
            { id: 4, name: 'Lays Classic', price: 20, weight: '50g', img: './lays.jpg' }
        ];

        let cart = {};

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="product-card p-4 shadow-sm border border-gray-100 flex flex-col justify-between">
                    <div>
                        <img src="${p.img}" class="w-full h-24 object-contain mb-3 rounded-lg" onerror="this.src='https://via.placeholder.com/150?text=Item'">
                        <span class="text-[8px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full uppercase tracking-tighter">10 Mins Delivery</span>
                        <h4 class="font-bold text-sm text-gray-800 leading-tight mt-1 h-10 overflow-hidden">${p.name}</h4>
                        <p class="text-[10px] text-gray-400 mb-2">${p.weight}</p>
                    </div>
                    <div class="flex justify-between items-center mt-2">
                        <span class="font-bold text-gray-900 text-base">₹${p.price}</span>
                        <div class="flex items-center bg-purple-50 rounded-xl border border-purple-200">
                            <button onclick="update(${p.id}, -1)" class="px-3 py-1 text-purple-700 font-bold hover:bg-purple-100 rounded-l-xl">-</button>
                            <span id="qty-${p.id}" class="px-1 text-xs font-bold text-purple-800">0</span>
                            <button onclick="update(${p.id}, 1)" class="px-3 py-1 text-purple-700 font-bold hover:bg-purple-100 rounded-r-xl">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function update(id, change) {
            cart[id] = (cart[id] || 0) + change;
            if (cart[id] < 0) cart[id] = 0;
            document.getElementById(`qty-${id}`).innerText = cart[id];
            
            let total = 0;
            products.forEach(p => total += (cart[p.id] || 0) * p.price);
            document.getElementById('cart-total').innerText = total;
            document.getElementById('btn-total').innerText = total;
        }

        function sendOrder() {
            let total = 0;
            let items = "";
            products.forEach(p => {
                if (cart[p.id] > 0) {
                    items += `✅ ${p.name} (${cart[p.id]} x ₹${p.price})\n`;
                    total += cart[p.id] * p.price;
                }
            });

            if (total === 0) {
                alert("Bhai, cart khali hai! Kuch toh select karo.");
                return;
            }

            // Your updated number: 8708719638
            const msg = encodeURIComponent(`🚀 *NEW ORDER - SAKET ZEPTO*\n---------------------------\n${items}---------------------------\n💰 *GRAND TOTAL: ₹${total}*\n\n📍 Deliver to my location ASAP!`);
            window.open(`https://wa.me/918271038573?text=${msg}`);
        }

        render();
    </script>
</body>
</html>
