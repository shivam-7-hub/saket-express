<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saket Zepto Master ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-card { transition: all 0.2s; border-radius: 24px; border: 1px solid #f3f4f6; }
        .product-card:hover { border-color: #7c3aed; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #cartBar { border-radius: 24px 24px 0 0; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#f8f9fa] pb-40 font-sans">

    <button onclick="toggleMode()" class="fixed top-4 right-4 z-[100] bg-black/80 backdrop-blur-md text-white px-4 py-2 rounded-full text-[10px] font-black tracking-widest border border-white/20">
        SWITCH MODE 🕹️
    </button>

    <div id="customerUI">
        <div class="bg-white p-5 sticky top-0 z-50 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-black text-purple-700 italic">SAKET <span class="text-yellow-500">ZEPTO</span>⚡</h1>
                <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">10 Mins Delivery</span>
            </div>
            <input type="text" id="searchInput" onkeyup="renderApp()" placeholder="Search 'Milk', 'Chips', 'Coke'..." 
                   class="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-purple-500 transition-all text-sm">
        </div>

        <div class="flex gap-3 p-4 overflow-x-auto no-scrollbar bg-white mb-2 shadow-sm">
            <button onclick="setCat('all')" class="bg-purple-600 text-white px-6 py-2 rounded-xl font-bold text-sm whitespace-nowrap">All Items</button>
            <button onclick="setCat('grocery')" class="bg-gray-100 px-6 py-2 rounded-xl font-bold text-sm whitespace-nowrap">Grocery</button>
            <button onclick="setCat('drinks')" class="bg-gray-100 px-6 py-2 rounded-xl font-bold text-sm whitespace-nowrap">Drinks</button>
            <button onclick="setCat('snacks')" class="bg-gray-100 px-6 py-2 rounded-xl font-bold text-sm whitespace-nowrap">Snacks</button>
        </div>

        <div id="productGrid" class="grid grid-cols-2 gap-4 p-4"></div>
        
        <div id="cartBar" class="fixed bottom-0 left-0 right-0 bg-purple-700 text-white p-6 hidden flex justify-between items-center z-[90] shadow-[0_-10px_25px_-5px_rgba(0,0,0,0.3)]">
            <div>
                <p id="itemCount" class="font-bold text-[10px] opacity-70 uppercase tracking-widest">0 Items Added</p>
                <p class="font-black text-2xl">₹<span id="grandTotal">0</span></p>
            </div>
            <button onclick="sendWhatsApp()" class="bg-yellow-400 text-purple-900 px-10 py-4 rounded-2xl font-black text-lg active:scale-95 transition-all">Order Now</button>
        </div>
    </div>

    <div id="adminUI" class="hidden min-h-screen bg-[#0f172a] text-white p-6">
        <h1 class="text-4xl font-black text-yellow-400 mb-8 italic tracking-tighter uppercase">Saket HQ 🕹️</h1>
        
        <div class="bg-gray-800/50 backdrop-blur-md p-6 rounded-[32px] border border-white/10 mb-8">
            <h3 class="text-xl font-bold mb-6 text-purple-400">Naya Item Add Karo</h3>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="Product Name (e.g. Kurkure)" class="w-full p-4 rounded-2xl bg-gray-700/50 text-white border border-white/10 outline-none focus:border-purple-500">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="pPrice" placeholder="Price (₹)" class="p-4 rounded-2xl bg-gray-700/50 text-white border border-white/10 outline-none">
                    <select id="pCat" class="p-4 rounded-2xl bg-gray-700/50 text-white border border-white/10 outline-none">
                        <option value="snacks">Snacks</option>
                        <option value="grocery">Grocery</option>
                        <option value="drinks">Drinks</option>
                    </select>
                </div>
                <input type="text" id="pImg" placeholder="Image File Name (e.g. lays.jpg)" class="w-full p-4 rounded-2xl bg-gray-700/50 text-white border border-white/10 outline-none">
                <button onclick="saveProduct()" class="w-full bg-green-500 py-4 rounded-2xl font-black text-lg hover:bg-green-400 transition-all shadow-lg">SAVE PRODUCT ✅</button>
            </div>
        </div>

        <div class="bg-gray-800/50 p-6 rounded-[32px] border border-white/10">
            <h3 class="text-xl font-bold mb-6 text-blue-400">Inventory Control</h3>
            <div id="adminList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        // Master Data Storage
        let products = JSON.parse(localStorage.getItem('saketMasterDB')) || [
            { id: 1, name: "Amul Gold Milk (500ml)", price: 32, img: "amul.jpg", cat: "grocery", inStock: true },
            { id: 2, name: "Maggi Instant Noodles", price: 14, img: "maggi.jpg", cat: "snacks", inStock: true },
            { id: 3, name: "Coca Cola (Can)", price: 45, img: "coke.jpg", cat: "drinks", inStock: true }
        ];

        let cart = {};
        let currentCat = 'all';
        let isAdmin = false;

        function renderApp() {
            // --- Customer Render ---
            const grid = document.getElementById('productGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            
            products.forEach(p => {
                if (p.inStock && (currentCat === 'all' || p.cat === currentCat) && p.name.toLowerCase().includes(search)) {
                    const qty = cart[p.name] ? cart[p.name].qty : 0;
                    grid.innerHTML += `
                        <div class="product-card bg-white p-4 flex flex-col items-center">
                            <div class="h-24 w-24 mb-3 flex items-center justify-center">
                                <img src="${p.img}" class="max-h-full object-contain" onerror="this.src='https://via.placeholder.com/100?text=No+Img'">
                            </div>
                            <h3 class="font-bold text-[13px] text-gray-800 h-10 text-center leading-tight mb-2">${p.name}</h3>
                            <div class="w-full flex justify-between items-center mt-auto">
                                <span class="font-black text-lg">₹${p.price}</span>
                                <div class="flex items-center gap-2">
                                    ${qty > 0 ? `
                                        <div class="flex items-center bg-purple-600 text-white rounded-xl overflow-hidden scale-90">
                                            <button onclick="updateQty('${p.name}', -1, ${p.price})" class="px-2 py-1 font-bold">-</button>
                                            <span class="px-2 font-black text-sm">${qty}</span>
                                            <button onclick="updateQty('${p.name}', 1, ${p.price})" class="px-2 py-1 font-bold">+</button>
                                        </div>` : 
                                        `<button onclick="updateQty('${p.name}', 1, ${p.price})" class="border-2 border-purple-600 text-purple-600 px-4 py-1.5 rounded-xl font-black text-xs uppercase">Add</button>`
                                    }
                                </div>
                            </div>
                        </div>`;
                }
            });

            // --- Admin Render ---
            const adminList = document.getElementById('adminList');
            adminList.innerHTML = '';
            products.forEach((p, idx) => {
                adminList.innerHTML += `
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                        <div>
                            <p class="font-bold text-sm text-gray-300">${p.name}</p>
                            <p class="text-[10px] text-purple-400 font-bold uppercase tracking-widest">${p.cat}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="toggleStock(${idx})" class="${p.inStock ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'} px-4 py-2 rounded-xl text-[10px] font-black border border-current">
                                ${p.inStock ? 'IN STOCK' : 'OUT OF STOCK'}
                            </button>
                            <button onclick="deleteProduct(${idx})" class="bg-gray-700 px-3 py-2 rounded-xl text-xs text-white">🗑️</button>
                        </div>
                    </div>`;
            });
            updateTotal();
        }

        function toggleMode() {
            isAdmin = !isAdmin;
            document.getElementById('customerUI').classList.toggle('hidden', isAdmin);
            document.getElementById('adminUI').classList.toggle('hidden', !isAdmin);
            renderApp();
        }

        function setCat(cat) { currentCat = cat; renderApp(); }

        function saveProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const img = document.getElementById('pImg').value;
            const cat = document.getElementById('pCat').value;

            if(name && price && img) {
                products.push({ id: Date.now(), name, price: parseInt(price), img, cat, inStock: true });
                localStorage.setItem('saketMasterDB', JSON.stringify(products));
                document.getElementById('pName').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pImg').value = '';
                renderApp();
                alert("Naya item dukan mein add ho gaya! ✅");
            } else { alert("Bhai, saari details bharna zaroori hai!"); }
        }

        function toggleStock(idx) {
            products[idx].inStock = !products[idx].inStock;
            localStorage.setItem('saketMasterDB', JSON.stringify(products));
            renderApp();
        }

        function deleteProduct(idx) {
            if(confirm("Ye item dukan se permanently hata dein?")) {
                products.splice(idx, 1);
                localStorage.setItem('saketMasterDB', JSON.stringify(products));
                renderApp();
            }
        }

        function updateQty(name, delta, price) {
            if (!cart[name]) cart[name] = { price, qty: 0 };
            cart[name].qty += delta;
            if (cart[name].qty <= 0) delete cart[name];
            renderApp();
        }

        function updateTotal() {
            let total = 0, count = 0;
            for (let k in cart) { total += cart[k].price * cart[k].qty; count += cart[k].qty; }
            document.getElementById('grandTotal').innerText = total;
            document.getElementById('itemCount').innerText = count + " Items Added";
            document.getElementById('cartBar').classList.toggle('hidden', count === 0);
        }

        function sendWhatsApp() {
            let msg = "*SAKET ZEPTO NEW ORDER*%0A%0A";
            let total = 0;
            for (let k in cart) {
                msg += `• ${k} x ${cart[k].qty} = ₹${cart[k].price * cart[k].qty}%0A`;
                total += cart[k].price * cart[k].qty;
            }
            msg += `%0A*Total Bill: ₹${total}*`;
            window.open(`https://wa.me/918708719638?text=${msg}`, '_blank');
        }

        renderApp();
    </script>
</body>
</html>
