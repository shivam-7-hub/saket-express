<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saket Zepto - Local Grocery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-card { transition: all 0.2s; border-radius: 12px; }
        .product-card:active { transform: scale(0.96); }
        .category-pill { white-space: nowrap; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-50">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-xl font-black text-purple-700 italic">SAKET ZEPTO</h1>
                <div class="bg-green-100 px-3 py-1 rounded-full border border-green-200">
                    <span class="text-xs font-bold text-green-700">🛒 ₹<span id="cart-total">0</span></span>
                </div>
            </div>
            <div class="relative">
                <input type="text" id="searchBar" onkeyup="searchFunction()" placeholder="Search 'Milk' or 'Bread'..." 
                class="w-full bg-gray-100 border-none rounded-xl py-2 px-10 text-sm focus:ring-2 focus:ring-purple-500">
                <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto pb-32">
        <div class="p-4">
            <div class="bg-purple-700 rounded-2xl p-4 text-white flex justify-between items-center shadow-lg">
                <div>
                    <p class="text-[10px] font-bold opacity-80 uppercase">Free Delivery</p>
                    <h2 class="text-lg font-bold italic">Maa Ke Liye Fresh!</h2>
                </div>
                <div class="text-3xl">🚀</div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 px-4" id="product-list">
            </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t z-50">
        <button onclick="sendOrder()" class="w-full max-w-md mx-auto bg-green-600 text-white font-bold py-4 rounded-xl shadow-xl flex justify-between px-6 items-center">
            <span>Place Order (WhatsApp)</span>
            <span class="bg-green-800 px-3 py-1 rounded-lg">₹<span id="btn-total">0</span></span>
        </button>
    </div>

    <script>
        const products = [
            { id: 1, name: 'Amul Gold Milk', price: 33, weight: '500ml', img: './amul.jpg' },
            { id: 2, name: 'Maggi Masala', price: 14, weight: '70g', img: './maggi.jpg' },
            { id: 3, name: 'Coca Cola', price: 45, weight: '750ml', img: './coke.jpg' },
            { id: 4, name: 'Lays Classic', price: 20, weight: '50g', img: './lays.jpg' },
            { id: 5, name: 'Fresh White Eggs', price: 42, weight: '6 pcs', img: 'https://5.imimg.com/data5/SELLER/Default/2022/10/TC/XQ/CH/10141644/fresh-white-eggs-500x500.jpg' },
            { id: 6, name: 'Harvest Bread', price: 35, weight: '400g', img: 'https://5.imimg.com/data5/SELLER/Default/2021/3/RE/WC/XN/12101737/harvest-gold-bread-500x500.jpg' },
            { id: 7, name: 'Tata Salt', price: 28, weight: '1kg', img: 'https://m.media-amazon.com/images/I/61M6K5WpY9L.jpg' },
            { id: 8, name: 'Fortune Oil', price: 145, weight: '1Ltr', img: 'https://m.media-amazon.com/images/I/61X-uK1e3cL.jpg' }
        ];

        let cart = {};

        function render(items = products) {
            const list = document.getElementById('product-list');
            list.innerHTML = items.map(p => `
                <div class="bg-white p-3 shadow-sm border border-gray-100 product-card flex flex-col justify-between">
                    <img src="${p.img}" class="w-full h-24 object-contain mb-2" onerror="this.src='https://via.placeholder.com/150?text=Saket+Item'">
                    <div>
                        <h4 class="font-bold text-xs h-8 overflow-hidden">${p.name}</h4>
                        <p class="text-[10px] text-gray-400">${p.weight}</p>
                    </div>
                    <div class="flex justify-between items-center mt-3">
                        <span class="font-bold text-sm">₹${p.price}</span>
                        <div class="flex items-center bg-purple-50 rounded-lg border border-purple-200">
                            <button onclick="update(${p.id}, -1)" class="px-2 py-1 text-purple-700 font-bold">-</button>
                            <span id="qty-${p.id}" class="px-1 text-xs font-bold">${cart[p.id] || 0}</span>
                            <button onclick="update(${p.id}, 1)" class="px-2 py-1 text-purple-700 font-bold">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function update(id, change) {
            cart[id] = (cart[id] || 0) + change;
            if (cart[id] < 0) cart[id] = 0;
            document.getElementById(`qty-${id}`).innerText = cart[id];
            let total = 0;
            products.forEach(p => total += (cart[p.id] || 0) * p.price);
            document.getElementById('cart-total').innerText = total;
            document.getElementById('btn-total').innerText = total;
        }

        function searchFunction() {
            const text = document.getElementById('searchBar').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(text));
            render(filtered);
        }

        function sendOrder() {
            let total = 0; let items = "";
            products.forEach(p => {
                if (cart[p.id] > 0) {
                    items += `✅ ${p.name} (${cart[p.id]} x ₹${p.price})\n`;
                    total += cart[p.id] * p.price;
                }
            });
            if (total === 0) { alert("Cart khali hai!"); return; }
            const msg = encodeURIComponent(`🚀 *NEW ORDER SAKET ZEPTO*\n\n${items}\n💰 *Total: ₹${total}*`);
            window.open(`https://wa.me/918708719638?text=${msg}`);
        }

        render();
    </script>
</body>
</html>
