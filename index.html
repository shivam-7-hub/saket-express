<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saket Zepto - 10 Min Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .category-scroll::-webkit-scrollbar { display: none; }
        .product-card { transition: transform 0.2s; }
        .product-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div>
                <h1 class="text-2xl font-black text-purple-700 italic">SAKET ZEPTO</h1>
                <p class="text-xs text-gray-500 font-bold">Delivery in 10 Mins</p>
            </div>
            <div class="bg-yellow-100 p-2 rounded-lg">
                <span class="text-sm font-bold text-yellow-700">🛒 Cart: ₹<span id="cart-total">0</span></span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto pb-24">
        
        <div class="p-4">
            <div class="bg-gradient-to-r from-purple-600 to-indigo-600 rounded-2xl p-6 text-white shadow-lg">
                <h2 class="text-xl font-bold italic">Maa Ke Liye Fresh Order!</h2>
                <p class="text-sm opacity-90">Get 20% OFF on your first order</p>
            </div>
        </div>

        <div class="px-4 py-2">
            <h3 class="font-bold text-gray-700 mb-3">Shop by Category</h3>
            <div class="flex gap-4 overflow-x-auto category-scroll pb-2 text-center">
                <div class="flex-shrink-0 w-16"><div class="bg-orange-100 p-3 rounded-full mb-1">🥛</div><span class="text-xs font-semibold">Dairy</span></div>
                <div class="flex-shrink-0 w-16"><div class="bg-red-100 p-3 rounded-full mb-1">🍜</div><span class="text-xs font-semibold">Snacks</span></div>
                <div class="flex-shrink-0 w-16"><div class="bg-blue-100 p-3 rounded-full mb-1">🥤</div><span class="text-xs font-semibold">Drinks</span></div>
                <div class="flex-shrink-0 w-16"><div class="bg-green-100 p-3 rounded-full mb-1">🥦</div><span class="text-xs font-semibold">Veggies</span></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 p-4" id="product-list">
            </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t">
        <button onclick="sendOrder()" class="w-full max-w-md mx-auto block bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-xl flex justify-between px-6 items-center transition-all">
            <span>Place Order via WhatsApp</span>
            <span class="bg-green-800 px-3 py-1 rounded-lg">₹<span id="btn-total">0</span></span>
        </button>
    </div>

    <script>
        const products = [
            { id: 1, name: 'Amul Gold Milk', price: 33, weight: '500ml', img: 'https://www.amul.com/files/products/AmulGold-500_1.jpg' },
            { id: 2, name: 'Maggi Noodles', price: 14, weight: '70g', img: 'https://m.media-amazon.com/images/I/8109v9pZ9ML._SL1500_.jpg' },
            { id: 3, name: 'Coca Cola', price: 40, weight: '750ml', img: 'https://m.media-amazon.com/images/I/51v8nyS19vL._SL1080_.jpg' },
            { id: 4, name: 'Lays Classic', price: 20, weight: '50g', img: 'https://m.media-amazon.com/images/I/719fpxI76CL._SL1500_.jpg' }
        ];

        let cart = {};

        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 product-card">
                    <img src="${p.img}" class="w-full h-32 object-contain mb-2 rounded-lg">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">10 MINS</span>
                    <h4 class="font-bold text-sm text-gray-800 leading-tight h-10">${p.name}</h4>
                    <p class="text-xs text-gray-500 mb-2">${p.weight}</p>
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-900">₹${p.price}</span>
                        <div class="flex items-center bg-purple-50 rounded-lg border border-purple-200">
                            <button onclick="updateCart(${p.id}, -1)" class="px-3 py-1 text-purple-700 font-bold">-</button>
                            <span id="qty-${p.id}" class="px-2 text-sm font-bold">0</span>
                            <button onclick="updateCart(${p.id}, 1)" class="px-3 py-1 text-purple-700 font-bold">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateCart(id, change) {
            cart[id] = (cart[id] || 0) + change;
            if (cart[id] < 0) cart[id] = 0;
            document.getElementById(`qty-${id}`).innerText = cart[id];
            
            let total = 0;
            products.forEach(p => {
                total += (cart[p.id] || 0) * p.price;
            });
            document.getElementById('cart-total').innerText = total;
            document.getElementById('btn-total').innerText = total;
        }

        function sendOrder() {
            let total = 0;
            let items = "";
            products.forEach(p => {
                if (cart[p.id] > 0) {
                    items += `✅ ${p.name} (${cart[p.id]} x ₹${p.price})\n`;
                    total += cart[p.id] * p.price;
                }
            });

            if (total === 0) {
                alert("Bhai, cart khali hai! Kuch toh add karo.");
                return;
            }

            const msg = encodeURIComponent(`🚀 *NEW ORDER - SAKET ZEPTO*\n\n${items}\n💰 *Total: ₹${total}*\n\n📍 Deliver to my location!`);
            window.open(`https://wa.me/918271038573?text=${msg}`);
        }

        renderProducts();
    </script>
</body>
</html>
