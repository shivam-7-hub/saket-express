<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saket Zepto - Live Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .category-scroll::-webkit-scrollbar { display: none; }
        .product-card { transition: transform 0.2s; border-radius: 15px; background: white; }
        .product-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-white p-4 shadow-md sticky top-0 z-50 text-center">
        <h1 class="text-2xl font-black text-purple-700 italic">SAKET ZEPTO</h1>
        <div class="bg-yellow-100 inline-block px-4 py-1 rounded-full mt-2 border border-yellow-300">
            <span class="text-sm font-bold text-yellow-700">🛒 Cart: ₹<span id="cart-total">0</span></span>
        </div>
    </header>

    <main class="max-w-md mx-auto pb-28">
        <div class="p-4">
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl p-5 text-white shadow-lg text-center">
                <h2 class="text-lg font-bold">Maa Ke Liye Fresh Order!</h2>
                <p class="text-xs opacity-80">Fastest Delivery in Town</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 p-4" id="product-list">
            </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t z-50">
        <button onclick="sendOrder()" class="w-full max-w-md mx-auto bg-green-600 text-white font-black py-4 rounded-2xl shadow-2xl flex justify-between px-6 items-center">
            <span>PLACE ORDER</span>
            <span class="bg-green-900 px-3 py-1 rounded-lg">₹<span id="btn-total">0</span></span>
        </button>
    </div>

    <script>
        // YAHAN DHAYAN DEIN: Ye naam wahi hain jo aapke folder mein hain
        const products = [
            { id: 1, name: 'Amul Gold Milk', price: 33, weight: '500ml', img: 'amul.jpg' },
            { id: 2, name: 'Maggi Masala', price: 14, weight: '70g', img: 'maggi.jpg' },
            { id: 3, name: 'Coca Cola', price: 45, weight: '750ml', img: 'coke.jpg' },
            { id: 4, name: 'Lays Chips', price: 20, weight: '50g', img: 'lays.jpg' }
        ];

        let cart = {};

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="product-card p-3 shadow-sm border border-gray-100">
                    <img src="${p.img}" class="w-full h-24 object-contain mb-2 rounded-lg" onerror="this.src='https://via.placeholder.com/150?text=Item'">
                    <h4 class="font-bold text-xs text-gray-800 leading-tight h-8">${p.name}</h4>
                    <div class="flex justify-between items-center mt-2">
                        <span class="font-bold text-gray-900 text-sm">₹${p.price}</span>
                        <div class="flex items-center bg-purple-50 rounded-lg">
                            <button onclick="update(${p.id}, -1)" class="px-2 py-1 text-purple-700 font-bold">-</button>
                            <span id="qty-${p.id}" class="px-1 text-xs font-bold">0</span>
                            <button onclick="update(${p.id}, 1)" class="px-2 py-1 text-purple-700 font-bold">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function update(id, change) {
            cart[id] = (cart[id] || 0) + change;
            if (cart[id] < 0) cart[id] = 0;
            document.getElementById(`qty-${id}`).innerText = cart[id];
            let total = 0;
            products.forEach(p => total += (cart[p.id] || 0) * p.price);
            document.getElementById('cart-total').innerText = total;
            document.getElementById('btn-total').innerText = total;
        }

        function sendOrder() {
            let total = 0; let items = "";
            products.forEach(p => {
                if (cart[p.id] > 0) {
                    items += `• ${p.name} (${cart[p.id]} x ₹${p.price})\n`;
                    total += cart[p.id] * p.price;
                }
            });
            if (total === 0) { alert("Cart khali hai!"); return; }
            const msg = encodeURIComponent(`📦 *SAKET ZEPTO ORDER*\n\n${items}\n💰 *Total: ₹${total}*`);
            window.open(`https://wa.me/918271038573?text=${msg}`);
        }
        render();
    </script>
</body>
</html>
