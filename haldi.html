<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saket Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="pb-32">

    <div class="p-5 bg-gradient-to-r from-purple-800 to-indigo-900 text-white rounded-b-3xl text-center shadow-lg">
        <h2 class="text-3xl font-black italic">SAKET EXPRESS</h2>
        <p class="text-xs opacity-80">Ghar ka saaman, ab ghar pe hi! 🚀</p>
    </div>

    <div class="px-5 pt-5 pb-2">
        <h3 class="text-lg font-bold text-gray-800">Top Selling Items 🔥</h3>
    </div>

    <div class="p-4 grid grid-cols-2 gap-4" id="product-list"></div>

    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 bg-black text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center hidden z-40">
        <div>
            <p class="text-xs opacity-70">Total Bill</p>
            <p class="text-xl font-bold" id="total-price">₹0</p>
        </div>
        <button onclick="showModal()" class="bg-yellow-400 text-black px-6 py-3 rounded-xl font-black uppercase">Checkout 🛒</button>
    </div>

    <div id="payment-modal" class="fixed inset-0 bg-black/60 hidden items-end z-50">
        <div class="bg-white w-full p-6 rounded-t-3xl shadow-2xl">
            <div class="w-12 h-1 bg-gray-300 rounded-full mx-auto mb-4"></div>
            <h3 class="text-2xl font-black mb-1">Delivery Details 📍</h3>
            <div class="mb-4">
                <textarea id="user-address" rows="2" placeholder="Makan No, Gali No, Landmark..." 
                class="w-full mt-2 p-3 bg-purple-50 border-2 border-purple-100 rounded-2xl focus:border-purple-600 outline-none text-sm font-medium"></textarea>
            </div>
            <div class="space-y-3">
                <button onclick="orderNow('COD')" class="w-full flex items-center p-4 border-2 border-green-500 rounded-2xl bg-green-50 active:scale-95 transition">
                    <span class="text-3xl mr-4">💵</span>
                    <div class="text-left"><p class="font-bold text-green-800 text-lg">Cash on Delivery</p></div>
                </button>
                <button onclick="orderNow('ONLINE')" class="w-full flex items-center p-4 border-2 border-blue-500 rounded-2xl bg-blue-50 active:scale-95 transition">
                    <span class="text-3xl mr-4">📱</span>
                    <div class="text-left"><p class="font-bold text-blue-800 text-lg">Pay Online (UPI)</p></div>
                </button>
            </div>
            <button onclick="hideModal()" class="w-full mt-4 text-gray-400 font-bold">Wapas</button>
        </div>
    </div>

    <script>
        // ITEMS LIST BADHAYI GAYI HAI
        const products = [
            { id: 1, name: "Amul Milk (1L)", price: 66, img: "🥛" },
            { id: 2, name: "Aashirvaad Atta (5kg)", price: 210, img: "🌾" },
            { id: 3, name: "Maggi Noodles", price: 14, img: "🍜" },
            { id: 4, name: "Coca Cola (750ml)", price: 45, img: "🥤" },
            { id: 5, name: "Aloo (Potato) 1kg", price: 30, img: "🥔" },
            { id: 6, name: "Pyaz (Onion) 1kg", price: 40, img: "🧅" },
            { id: 7, name: "Fortune Oil (1L)", price: 145, img: "🧴" },
            { id: 8, name: "Parle-G Biscuit", price: 10, img: "🍪" },
            { id: 9, name: "Surf Excel 500g", price: 65, img: "🧼" },
            { id: 10, name: "Tata Salt 1kg", price: 28, img: "🧂" },
            { id: 11, name: "Amul Butter 100g", price: 56, img: "🧈" },
            { id: 12, name: "Dahi (Curd) 200g", price: 35, img: "🍧" }
        ];

        let cart = {};

        function init() {
            const list = document.getElementById('product-list');
            products.forEach(p => {
                cart[p.id] = 0;
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center">
                        <div class="text-5xl mb-2">${p.img}</div>
                        <h4 class="font-bold text-gray-800 text-sm text-center h-10 overflow-hidden">${p.name}</h4>
                        <p class="text-purple-700 font-black mb-3">₹${p.price}</p>
                        <div class="flex items-center bg-gray-100 rounded-full p-1">
                            <button onclick="changeQty(${p.id}, -1)" class="w-8 h-8 bg-white rounded-full font-bold shadow text-lg">-</button>
                            <span id="qty-${p.id}" class="mx-3 font-bold">0</span>
                            <button onclick="changeQty(${p.id}, 1)" class="w-8 h-8 bg-purple-600 text-white rounded-full font-bold shadow text-lg">+</button>
                        </div>
                    </div>
                `;
            });
        }

        function changeQty(id, delta) {
            cart[id] = Math.max(0, cart[id] + delta);
            document.getElementById(`qty-${id}`).innerText = cart[id];
            let total = 0;
            products.forEach(p => { total += p.price * cart[p.id]; });
            document.getElementById('total-price').innerText = `₹${total}`;
            document.getElementById('cart-bar').classList.toggle('hidden', total === 0);
        }

        function showModal() { document.getElementById('payment-modal').style.display = 'flex'; }
        function hideModal() { document.getElementById('payment-modal').style.display = 'none'; }

        function orderNow(method) {
            const addr = document.getElementById('user-address').value;
            if (!addr) { return alert("Address toh daalo bhai! 📍"); }
            let list = "";
            let total = 0;
            products.forEach(p => {
                if (cart[p.id] > 0) {
                    list += `✅ ${p.name} (${cart[p.id]} x ₹${p.price})\n`;
                    total += cart[p.id] * p.price;
                }
            });
            const myWA = "918708719638";
            const myUPI = "8708719638@ybl";
            if (method === 'ONLINE') {
                window.location.href = `upi://pay?pa=${myUPI}&pn=SaketExpress&am=${total}&cu=INR`;
                setTimeout(() => { finish(myWA, list, total, "PAID ONLINE ✅", addr); }, 4000);
            } else {
                finish(myWA, list, total, "CASH ON DELIVERY 💵", addr);
            }
        }

        function finish(num, items, bill, status, address) {
            const finalMsg = `🚀 *NEW ORDER - SAKET EXPRESS*\n\n${items}\n💰 *Bill: ₹${bill}*\n💳 *Payment: ${status}*\n📍 *Address:* ${address}`;
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(finalMsg)}`);
        }
        init();
    </script>
</body>
</html>
